<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <filter id="grain" color-interpolation-filters="linearRGB">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.75 0.75"
      numOctaves="4"
      seed="15"
      stitchTiles="stitch"
      result="turbulence"
    />
    <feColorMatrix
      type="saturate"
      values="0"
      in="turbulence"
      result="greyscale"
    />
    <feBlend
      in="SourceGraphic"
      in2="greyscale"
      mode="overlay"
      result="blend"
    />
    <feComposite
      in="blend"
      in2="SourceGraphic"
      operator="in"
    />
  </filter>
  <rect width="100%" height="100%" fill="transparent" filter="url(#grain)" opacity="0.65" />
</svg>
